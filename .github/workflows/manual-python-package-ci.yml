name: Manual Python Package CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-package:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"

    defaults:
      run:
        shell: bash
        working-directory: python-package

    env:
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
      PIP_NO_CACHE_DIR: "1"
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux GUI runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0
        working-directory: .

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine pytest

      - name: Install package with GUI extra
        run: |
          python -m pip install -e ".[gui]"

      - name: Check installed dependencies
        run: |
          python -m pip check

      - name: Import smoke test
        run: |
          python - <<'PY'
          import insightface
          import insightface.gui
          from insightface.data import get_object

          assert insightface.__version__ == "1.0"
          assert insightface.gui.__version__ == "1.0"
          assert get_object("meanshape_68") is not None
          print("InsightFace import smoke test passed.")
          PY

      - name: Run GUI and packaging tests
        run: |
          pytest tests/gui -q

      - name: Build wheel
        run: |
          python -m build --wheel

      - name: Check wheel metadata
        run: |
          python -m twine check dist/*

      - name: Inspect wheel contents
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheels = sorted(Path("dist").glob("insightface-1.0-*.whl"))
          assert wheels, "No wheel was built."
          wheel_path = wheels[-1]

          with ZipFile(wheel_path) as archive:
              names = archive.namelist()
              wheel_metadata = archive.read("insightface-1.0.dist-info/WHEEL").decode()
              package_metadata = archive.read("insightface-1.0.dist-info/METADATA").decode()

          assert "Root-Is-Purelib: true" in wheel_metadata
          assert "Tag: py3-none-any" in wheel_metadata
          assert "Requires-Dist: onnxruntime" in package_metadata
          assert "Requires-Dist: opencv-python" in package_metadata
          assert "Provides-Extra: gui" in package_metadata
          assert "Provides-Extra: pdf" in package_metadata
          assert "Requires-Dist: PySide6-Essentials" in package_metadata
          assert "Requires-Dist: reportlab" in package_metadata
          assert "Requires-Dist: pandas" not in package_metadata
          assert "Requires-Dist: PySide6 " not in package_metadata
          assert "insightface/data/images/t1.jpg" in names
          assert "insightface/data/objects/meanshape_68.pkl" in names
          assert not any(".data/data/insightface/data/" in name for name in names)
          assert not any(name.endswith((".so", ".pyd", ".dll", ".dylib")) for name in names)

          print(f"Wheel inspection passed: {wheel_path}")
          PY
